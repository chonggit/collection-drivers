machines:
  - id: scanner_1
    enabled: true
    type: CollectionDrivers.ScannerDriver.ScannerMachine, CollectionDrivers.ScannerDriver
    strategy: CollectionDrivers.ScannerDriver.Strategies.ScannerStrategy, CollectionDrivers.ScannerDriver
    handler: l99.driver.@base.Handler, base-driver

    CollectionDrivers.ScannerDriver.ScannerMachine, CollectionDrivers.ScannerDriver:
      sweep_ms: 500

    CollectionDrivers.ScannerDriver.Strategies.ScannerStrategy, CollectionDrivers.ScannerDriver:
      host: "192.168.250.10"
      port: 2001
      mode: sync
      retry_count: 3
      connect_timeout_ms: 3000
      receive_timeout_ms: 5000
      dedup_enabled: true

      protocol:
        send_command_hex: "7374617274"
        response_encoding: ascii
        barcode_regex: "<p>(?<barcode>.*?)</p>"
        regex_group_index: 1
        frame_delimiter_hex: "0A"
