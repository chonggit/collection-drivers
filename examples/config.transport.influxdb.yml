machines:
  - id: battery_1
    enabled: true
    type: CollectionDrivers.BatteryDriver.BatteryMachine, CollectionDrivers.BatteryDriver
    strategy: CollectionDrivers.BatteryDriver.Strategies.BatteryTcpStrategy, CollectionDrivers.BatteryDriver
    handler: CollectionDrivers.Common.TransportHandler, CollectionDrivers.Common
    transport: CollectionDrivers.Transport.InfluxDB.InfluxDbTransport, CollectionDrivers.Transport.InfluxDB

    CollectionDrivers.Transport.InfluxDB.InfluxDbTransport, CollectionDrivers.Transport.InfluxDB:
      host: http://localhost:8086
      token: your-super-secret-token
      bucket: battery_metrics
      org: my-org

      # Scriban 模板：将采集数据渲染为 InfluxDB Line Protocol
      # 模板变量：data.observation, data.state.data
      transformers:
        # SWEEP_END 模板 — 采集周期结束时写一条状态记录
        SWEEP_END: |
          battery,sweep={{ observation.machine }} online={{ data.online }}i,healthy={{ data.healthy }}i {{ observation.time }}
